<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="tartaly">
        <header>
            <h1>Tic-Tac-Toe</h1>
            <div class="pontszam-tablazat">
            <div class="pontszam">X: <span id="x-pontszam">0</span></div>
            <div class="pontszam">O: <span id="o-pontszam">0</span></div>
            </div>
        </header>
        <section id="jatek-tabla" class="tabla">
            <div class="cella" data-index="0"></div>
            <div class="cella" data-index="1"></div>
            <div class="cella" data-index="2"></div>
            <div class="cella" data-index="3"></div>
            <div class="cella" data-index="4"></div>
            <div class="cella" data-index="5"></div>
            <div class="cella" data-index="6"></div>
            <div class="cella" data-index="7"></div>
            <div class="cella" data-index="8"></div>
        </section>

        <footer class="vezerlok">
            <p id="allapot-szoveg">X jön!</p>
            <div class="gomb-tartaly">
                <button id="uj-jatek-gomb" class="gomb-elsodleges">Új játék</button>
                <button id="elozmenyek-torlese" class="gomb-masodlagos">Törlés</button>
            </div>
        </footer>
    </main>
    <div id="eredmeny-ablak" class="takaras" style="display: none;">
        <div class="modalis-ablak">
            <h2 id="gyoztes-uzenet-szoveg"></h2>
            <div class="modalis-gombok">
                <button id="modalis-uj-meccs" class="gomb-elsodleges">Új meccs</button>
                <button id="modalis-kilepes" class="gomb-masodlagos">Kilépés</button>
            </div>
        </div>
    </div>

    <div id="indito-ablak" class="takaras" style="display: none;">
        <div class="modalis-ablak">
            <h2>ÜDVÖZÖLLEK!</h2>
            <p id="mentes-info"></p>
            <div class="modalis-gombok">
                <button id="folytatas-gomb" class="gomb-elsodleges">Folytatás</button>
                <button id="nullazas-gomb" class="gomb-masodlagos">Nullázás</button>
            </div>
        </div>
    </div> 
    <script src="script.js"></script>
</body>
</html>
